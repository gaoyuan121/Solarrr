<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Solar System Explorer</title>
  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      color: #fff;
      width: 100vw; height: 100vh;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    body.dragging { cursor: grabbing; }
    #stars-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
    #solar-system { position: fixed; top:50%; left:50%; transform-origin:0 0; z-index:1; width:0; height:0; will-change:transform; }

    .orbit { position:absolute; border:1px solid rgba(255,255,255,0.22); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
    .belt { position:absolute; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
    .asteroid-belt { border:8px dotted rgba(160,140,110,0.12); }
    .kuiper-belt { border:14px dotted rgba(100,130,170,0.08); }

    .sun {
      position:absolute; width:80px; height:80px; border-radius:50%;
      top:50%; left:50%; transform:translate(-50%,-50%);
      cursor:pointer; z-index:100;
      background:transparent;
    }
    .sun .label { position:absolute; bottom:-22px; left:50%; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(255,220,100,0.8); white-space:nowrap; }

    .planet-orbit { position:absolute; top:50%; left:50%; width:0; height:0; z-index:50; }
    @keyframes orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .planet { position:absolute; border-radius:50%; cursor:pointer; transition:filter 0.3s; transform:translate(-50%,-50%); background:transparent !important; box-shadow:none !important; }
    .planet:hover { filter:none; z-index:200; }
    .planet .label { position:absolute; bottom:-20px; left:50%; font-size:9px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:rgba(255,255,255,0.6); white-space:nowrap; transform-origin:center top; }
    .planet:hover .label { color:rgba(255,255,255,0.9); }

    .dwarf-planet { position:absolute; border-radius:50%; cursor:pointer; transition:filter 0.3s; transform:translate(-50%,-50%); background:transparent !important; box-shadow:none !important; }
    .dwarf-planet:hover { filter:none; }
    .dwarf-planet .label { position:absolute; bottom:-16px; left:50%; font-size:8px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:rgba(255,255,255,0.5); white-space:nowrap; transform-origin:center top; }

    .saturn-rings { display:none; position:absolute; width:200%; height:50%; top:50%; left:50%; transform:translate(-50%,-50%) rotateX(75deg); border:3px solid rgba(210,190,150,0.4); border-radius:50%; pointer-events:none; }
    .saturn-rings::after { content:''; position:absolute; width:85%; height:85%; top:50%; left:50%; transform:translate(-50%,-50%); border:2px solid rgba(210,190,150,0.25); border-radius:50%; }
    .saturn-rings::before { content:''; position:absolute; width:115%; height:115%; top:50%; left:50%; transform:translate(-50%,-50%); border:1.5px solid rgba(210,190,150,0.15); border-radius:50%; }

    .uranus-rings { display:none; position:absolute; width:55%; height:180%; top:50%; left:50%; transform:translate(-50%,-50%) rotateY(15deg); border:2px solid rgba(150,210,230,0.25); border-radius:50%; pointer-events:none; }
    .uranus-rings::after { content:''; position:absolute; width:80%; height:90%; top:50%; left:50%; transform:translate(-50%,-50%); border:1.5px solid rgba(150,210,230,0.15); border-radius:50%; }

    #info-panel {
      position:fixed; right:24px; top:50%; transform:translateY(-50%);
      background:rgba(10,10,30,0.88); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:24px;
      max-width:290px; width:290px; z-index:1000;
      opacity:0; pointer-events:none;
      transition:opacity 0.5s ease, transform 0.5s ease;
      transform:translateY(-50%) translateX(20px);
      max-height:80vh; overflow-y:auto; overflow-x:hidden;
    }
    #info-panel.visible { opacity:1; pointer-events:auto; transform:translateY(-50%) translateX(0); }
    #info-panel::-webkit-scrollbar { width:4px; }
    #info-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }
    #info-panel h2 { font-size:20px; font-weight:700; margin-bottom:4px; }
    #info-panel .subtitle { font-size:10px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:2px; margin-bottom:14px; }
    #info-panel .info-divider { height:1px; background:linear-gradient(to right,rgba(255,255,255,0.1),transparent); margin:10px 0; }
    #info-panel .info-fact { display:flex; justify-content:space-between; align-items:baseline; margin:6px 0; gap:8px; }
    #info-panel .info-fact .fact-label { font-size:10px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; flex-shrink:0; }
    #info-panel .info-fact .fact-value { font-size:12px; font-weight:600; color:rgba(255,255,255,0.85); text-align:right; }
    #info-panel .description { font-size:12px; line-height:1.7; color:rgba(255,255,255,0.65); margin-top:12px; }
    #info-panel .fun-fact { margin-top:12px; padding:10px 12px; background:rgba(255,255,255,0.04); border-radius:12px; border-left:3px solid rgba(255,200,100,0.4); }
    #info-panel .fun-fact .fun-label { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,200,100,0.6); margin-bottom:4px; }
    #info-panel .fun-fact p { font-size:11px; line-height:1.6; color:rgba(255,255,255,0.6); }

    .moon-system { position:absolute; top:50%; left:50%; width:0; height:0; opacity:0; transition:opacity 0.8s; pointer-events:none; }
    .moon-system.visible { opacity:1; pointer-events:auto; }
    .moon-orbit-ring { position:absolute; border:1px solid rgba(255,255,255,0.08); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
    .moon-orbit-wrapper { position:absolute; top:50%; left:50%; width:0; height:0; animation:orbit linear infinite; }
    .moon { position:absolute; border-radius:50%; cursor:pointer; transform:translate(-50%,-50%); transition:filter 0.2s; }
    .moon:hover { filter:brightness(1.3); }
    .moon .moon-label { position:absolute; bottom:-14px; left:50%; font-size:7px; font-weight:600; letter-spacing:0.6px; text-transform:uppercase; color:rgba(255,255,255,0.45); white-space:nowrap; transform-origin:center top; }
    .moon:hover .moon-label { color:rgba(255,255,255,0.8); }

    #nav-panel {
      position:fixed; left:24px; top:50%; transform:translateY(-50%);
      background:rgba(10,10,30,0.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.08); border-radius:14px;
      padding:8px; z-index:1000;
      max-height:86vh; overflow-y:auto;
      display:flex; flex-direction:column; gap:1px;
    }
    #nav-panel::-webkit-scrollbar { width:4px; }
    #nav-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }
    #nav-home, #nav-list, #nav-misc { display:flex; flex-direction:column; gap:1px; }
    #nav-home::after, #nav-list::after { content:''; display:block; height:1px; background:rgba(255,255,255,0.08); margin:4px 8px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:5px 10px 5px 6px; cursor:pointer; border-radius:8px; transition:background 0.2s; min-width:118px; }
    .nav-item:hover { background:rgba(255,255,255,0.08); }
    .nav-item.active { background:rgba(255,255,255,0.14); }
    .nav-item-icon { width:18px; height:18px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; box-shadow:inset -2px -2px 4px rgba(0,0,0,0.4); }
    .nav-item-icon.icon-svg { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); box-shadow:none; }
    .nav-item-icon.icon-svg svg { width:11px; height:11px; fill:none; stroke:rgba(255,255,255,0.75); stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
    .nav-item-icon.icon-svg svg.fill-icon { fill:rgba(255,255,255,0.75); stroke:none; }
    .nav-item-icon.icon-text { font-size:10px; font-weight:700; color:rgba(255,255,255,0.75); letter-spacing:0; }
    .nav-divider { height:1px; background:rgba(255,255,255,0.08); margin:4px 8px; }
    .nav-item-name { font-size:10px; font-weight:600; letter-spacing:0.6px; color:rgba(255,255,255,0.65); text-transform:uppercase; white-space:nowrap; }
    .nav-item:hover .nav-item-name { color:rgba(255,255,255,0.95); }
    .nav-item.active .nav-item-name { color:rgba(255,255,255,1); }

    @media (max-width:600px) {
      #nav-panel {
        top:14px; bottom:auto; left:8px; right:8px; transform:none;
        background:transparent; border:none; padding:0; backdrop-filter:none; -webkit-backdrop-filter:none;
        max-height:none; overflow:visible;
        flex-direction:column; gap:8px;
      }
      #nav-home, #nav-misc {
        flex-direction:row; gap:6px;
        background:rgba(10,10,30,0.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
        border:1px solid rgba(255,255,255,0.08); border-radius:999px;
        padding:5px;
      }
      #nav-home::after, #nav-list::after { display:none; }
      #nav-home { position:absolute; top:0; left:0; }
      #nav-misc { position:absolute; top:0; right:0; }
      #nav-home .nav-item, #nav-misc .nav-item {
        min-width:0; padding:0; width:32px; height:32px;
        justify-content:center; gap:0;
      }
      #nav-home .nav-item-name, #nav-misc .nav-item-name { display:none; }
      #nav-home .nav-item-icon, #nav-misc .nav-item-icon { width:18px; height:18px; }
      #nav-list {
        margin-top:46px;
        flex-direction:row; gap:2px;
        background:rgba(10,10,30,0.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
        border:1px solid rgba(255,255,255,0.08); border-radius:999px;
        padding:5px 6px; overflow-x:auto; overflow-y:hidden;
        white-space:nowrap;
      }
      #nav-list::after { display:none; }
      #nav-list::-webkit-scrollbar { height:0; }
      #nav-list { scrollbar-width:none; }
      #nav-list .nav-item { flex-shrink:0; min-width:0; padding:3px 9px 3px 4px; gap:6px; }
      #nav-list .nav-item-icon { width:14px; height:14px; }
      #nav-list .nav-item-name { font-size:8px; letter-spacing:0.4px; }
      .nav-divider { display:none; }
    }

    #dedication { position:fixed; bottom:24px; right:32px; font-size:12px; font-weight:300; color:rgba(255,255,255,0.45); letter-spacing:0.5px; font-style:italic; z-index:999; }
    #hint { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-size:11px; color:rgba(255,255,255,0.2); letter-spacing:1px; z-index:999; transition:opacity 0.5s; white-space:nowrap; }
    #title { position:fixed; top:28px; left:50%; transform:translateX(-50%); font-size:14px; font-weight:300; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.2); z-index:999; white-space:nowrap; }
    .belt-label { position:absolute; font-size:8px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.15); white-space:nowrap; pointer-events:none; transform-origin:center center; }

    @media (max-width:600px) {
      #title { display:none; }
      #hint { font-size:10px; bottom:60px; }
      #dedication { bottom:12px; right:16px; font-size:10px; }
      #info-panel { right:0; left:0; bottom:0; top:auto; transform:translateY(100%); max-width:100%; width:100%; max-height:32vh; border-radius:18px 18px 0 0; padding:14px 18px 18px; }
      #info-panel h2 { font-size:16px; }
      #info-panel .subtitle { font-size:9px; margin-bottom:8px; }
      #info-panel .info-divider { margin:6px 0; }
      #info-panel .info-fact { margin:3px 0; }
      #info-panel .info-fact .fact-label { font-size:9px; }
      #info-panel .info-fact .fact-value { font-size:11px; }
      #info-panel .description { font-size:11px; line-height:1.55; margin-top:8px; }
      #info-panel .fun-fact { margin-top:8px; padding:7px 10px; }
      #info-panel.visible { transform:translateY(0); }
    }
    @supports (padding-bottom:env(safe-area-inset-bottom)) {
      @media (max-width:600px) {
        #info-panel { padding-bottom:calc(20px + env(safe-area-inset-bottom)); }
        #dedication { bottom:calc(12px + env(safe-area-inset-bottom)); }
      }
    }
  </style>
</head>
<body>
  <canvas id="stars-canvas"></canvas>
  <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;"></canvas>
  <div id="title">Our Solar System</div>
  <div id="solar-system"></div>
  <div id="info-panel"></div>

  <div id="nav-panel">
    <div id="nav-home"></div>
    <div id="nav-list"></div>
    <div id="nav-misc"></div>
  </div>

  <div id="hint"></div>
  <div id="dedication">For my son Noe, be curious and adventurous.</div>

<script type="module">
import * as THREE from 'three';

// ==================== STARS ====================
const starsCanvas = document.getElementById('stars-canvas');
const sctx = starsCanvas.getContext('2d');
let starPos = [];
function initStars() {
  starPos = [];
  for (let i = 0; i < 600; i++) starPos.push({ x: Math.random()*starsCanvas.width, y: Math.random()*starsCanvas.height, r: Math.random()*1.2, a: Math.random()*0.6+0.1 });
  sctx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
  starPos.forEach(s => { sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2); sctx.fillStyle=`rgba(255,255,255,${s.a})`; sctx.fill(); });
}
function resizeStars() { starsCanvas.width=window.innerWidth; starsCanvas.height=window.innerHeight; initStars(); }
resizeStars();

// ==================== THREE.JS SCENE ====================
const threeCanvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true, premultipliedAlpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight, false);
renderer.setClearColor(0x000000, 0);
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-window.innerWidth/2, window.innerWidth/2, window.innerHeight/2, -window.innerHeight/2, 1, 20000);
camera.position.z = 5000;

function resizeThree() {
  const w = window.innerWidth, h = window.innerHeight;
  camera.left = -w/2; camera.right = w/2; camera.top = h/2; camera.bottom = -h/2;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
}

// Procedural radial-glow texture for the sun corona (sprite-based "fake bloom")
function makeGlowTexture() {
  const size = 256;
  const cvs = document.createElement('canvas');
  cvs.width = cvs.height = size;
  const ctx = cvs.getContext('2d');
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0.00, 'rgba(255,225,150,0.55)');
  grad.addColorStop(0.15, 'rgba(255,200,110,0.32)');
  grad.addColorStop(0.35, 'rgba(255,165, 70,0.16)');
  grad.addColorStop(0.60, 'rgba(255,135, 45,0.06)');
  grad.addColorStop(0.85, 'rgba(255,110, 25,0.02)');
  grad.addColorStop(1.00, 'rgba(255,100, 20,0.00)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  const t = new THREE.CanvasTexture(cvs);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

// Lighting: sun point light + low ambient
const sunLight = new THREE.PointLight(0xffffff, 2.5, 0, 0);
sunLight.position.set(0, 0, 200);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.18));

// Texture loader — color maps get sRGB, data maps (bump/normal/roughness) stay linear
const texLoader = new THREE.TextureLoader();
function loadColor(url) { const t = texLoader.load(url); t.colorSpace = THREE.SRGBColorSpace; return t; }
function loadData(url)  { return texLoader.load(url); }

const tex = {
  sun:            loadColor('textures/sun.jpg'),
  mercury:        loadColor('textures/mercury.jpg'),
  mercuryBump:    loadData ('textures/mercury-bump.jpg'),
  venus:          loadColor('textures/venus_surface.jpg'),
  venusBump:      loadData ('textures/venus-bump.jpg'),
  earth:          loadColor('textures/earth_daymap.jpg'),
  earthNormal:    loadData ('textures/earth_normal.jpg'),
  earthSpecular:  loadData ('textures/earth_specular.jpg'),
  earthBump:      loadData ('textures/earth-bump.jpg'),
  mars:           loadColor('textures/mars.jpg'),
  marsBump:       loadData ('textures/mars-bump.jpg'),
  jupiter:        loadColor('textures/jupiter.jpg'),
  saturn:         loadColor('textures/saturn.jpg'),
  saturnRing:     loadColor('textures/saturn_ring.png'),
  uranus:         loadColor('textures/uranus.jpg'),
  neptune:        loadColor('textures/neptune.jpg'),
  // Dwarf planets
  pluto:          loadColor('textures/pluto.jpg'),
  plutoBump:      loadData ('textures/pluto_bump.jpg'),
  ceres:          loadColor('textures/ceres_fictional.jpg'),
  haumea:         loadColor('textures/haumea_fictional.jpg'),
  makemake:       loadColor('textures/makemake_fictional.jpg'),
  eris:           loadColor('textures/eris_fictional.jpg'),
  // Moons
  moon:           loadColor('textures/moon.jpg'),
  moonBump:       loadData ('textures/moon-bump.jpg'),
  phobos:         loadColor('textures/phobos.jpg'),
  deimos:         loadColor('textures/deimos.jpg'),
  io:             loadColor('textures/io.jpg'),
  europa:         loadColor('textures/europa.jpg'),
  ganymede:       loadColor('textures/ganymede.jpg'),
  callisto:       loadColor('textures/callisto.jpg'),
  titan:          loadColor('textures/titan.png'),
  enceladus:      loadColor('textures/enceladus.jpg'),
  mimas:          loadColor('textures/mimas.jpg'),
  rhea:           loadColor('textures/rhea.jpg'),
  iapetus:        loadColor('textures/iapetus.jpg'),
  titania:        loadColor('textures/titania.jpg'),
  oberon:         loadColor('textures/oberon.jpg'),
  ariel:          loadColor('textures/ariel.jpg'),
  umbriel:        loadColor('textures/umbriel.jpg'),
  triton:         loadColor('textures/triton.jpg'),
  proteus:        loadColor('textures/proteus.jpg'),
  charon:         loadColor('textures/charon.jpg'),
};

// Meshes keyed by planet id
const meshes = {};
const sphereGeo = new THREE.SphereGeometry(1, 64, 64);

function makeStandard(map, opts = {}) {
  return new THREE.MeshStandardMaterial({ map, roughness: 0.95, metalness: 0.0, ...opts });
}

// Sun — emissive, no lighting needed. Slightly warm tint instead of pure white.
meshes.sun = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({ map: tex.sun, color: 0xffe8b8 }));
scene.add(meshes.sun);
// Soft warm corona, single sprite, low opacity additive
const sunGlowMat = new THREE.SpriteMaterial({
  map: makeGlowTexture(),
  color: 0xffd089,
  blending: THREE.AdditiveBlending,
  transparent: true,
  depthWrite: false,
  depthTest: false,
});
const sunGlow = new THREE.Sprite(sunGlowMat);
sunGlow.scale.set(4.6, 4.6, 1);
meshes.sun.add(sunGlow);

// Terrestrial + gas planets
meshes.mercury = new THREE.Mesh(sphereGeo, makeStandard(tex.mercury, { bumpMap: tex.mercuryBump, bumpScale: 0.02 }));
meshes.venus   = new THREE.Mesh(sphereGeo, makeStandard(tex.venus,   { bumpMap: tex.venusBump,   bumpScale: 0.015 }));
meshes.earth   = new THREE.Mesh(sphereGeo, new THREE.MeshStandardMaterial({
  map: tex.earth, normalMap: tex.earthNormal, roughnessMap: tex.earthSpecular,
  bumpMap: tex.earthBump, bumpScale: 0.015, roughness: 0.9, metalness: 0.0
}));
meshes.mars    = new THREE.Mesh(sphereGeo, makeStandard(tex.mars, { bumpMap: tex.marsBump, bumpScale: 0.025 }));
meshes.jupiter = new THREE.Mesh(sphereGeo, makeStandard(tex.jupiter));
meshes.saturn  = new THREE.Mesh(sphereGeo, makeStandard(tex.saturn));
meshes.uranus  = new THREE.Mesh(sphereGeo, makeStandard(tex.uranus));
meshes.neptune = new THREE.Mesh(sphereGeo, makeStandard(tex.neptune));
['mercury','venus','earth','mars','jupiter','saturn','uranus','neptune'].forEach(id => scene.add(meshes[id]));

// Saturn rings
const ringGeo = new THREE.RingGeometry(1.4, 2.3, 128);
// Fix UVs so the texture maps radially
{
  const pos = ringGeo.attributes.position;
  const uv = ringGeo.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    const r = Math.hypot(pos.getX(i), pos.getY(i));
    const u = (r - 1.4) / (2.3 - 1.4);
    uv.setXY(i, u, 0.5);
  }
}
const ringMat = new THREE.MeshBasicMaterial({ map: tex.saturnRing, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
const saturnRing = new THREE.Mesh(ringGeo, ringMat);
saturnRing.rotation.x = Math.PI * 0.48;
meshes.saturn.add(saturnRing);

// Uranus rings — procedural canvas texture mimicking real Uranian ring structure:
// several narrow dark bands (ε, δ, γ, β, α, 4, 5, 6) separated by gaps.
function makeUranusRingTexture() {
  const cvs = document.createElement('canvas');
  cvs.width = 1024; cvs.height = 2;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  // Inner radius = 0 in u, outer = 1. Real rings are clustered in outer ~30% of the visible band.
  // Bands defined as [center, width, alpha]
  const bands = [

    [0.11, 0.010, 0.55], // 5
    [0.17, 0.012, 0.60], // 4
    [0.27, 0.014, 0.65], // α
    [0.34, 0.014, 0.65], // β
    [0.46, 0.008, 0.50], // η
    [0.52, 0.010, 0.55], // γ
    [0.60, 0.012, 0.60], // δ
    [0.78, 0.006, 0.35], // λ (faint)
    [0.92, 0.040, 0.85], // ε (brightest, widest)
  ];
  bands.forEach(([c, w, a]) => {
    const x0 = (c - w/2) * cvs.width;
    const x1 = (c + w/2) * cvs.width;
    const grad = ctx.createLinearGradient(x0, 0, x1, 0);
    grad.addColorStop(0,   `rgba(70,70,75,0)`);
    grad.addColorStop(0.5, `rgba(110,105,100,${a})`);
    grad.addColorStop(1,   `rgba(70,70,75,0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(x0, 0, x1 - x0, cvs.height);
  });
  const t = new THREE.CanvasTexture(cvs);
  t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = t.wrapT = THREE.ClampToEdgeWrapping;
  return t;
}

// Procedural texture for tiny moons that have no published photographic maps
// (Hi'iaka, Namaka, MK2, Dysnomia). Generates a cratered/mottled equirectangular map.
function makeProceduralMoonTexture(seed, baseRGB) {
  const W = 512, H = 256;
  const cvs = document.createElement('canvas');
  cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  // Seeded PRNG
  let s = seed;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const [br, bg, bb] = baseRGB;
  // Base fill
  ctx.fillStyle = `rgb(${br},${bg},${bb})`;
  ctx.fillRect(0, 0, W, H);
  // Large mottled patches
  for (let i = 0; i < 80; i++) {
    const x = rnd() * W, y = rnd() * H;
    const r = 12 + rnd() * 50;
    const shade = (rnd() - 0.5) * 60;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, `rgba(${br+shade|0},${bg+shade|0},${bb+shade|0},0.55)`);
    grad.addColorStop(1, `rgba(${br},${bg},${bb},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  // Craters: dark interior + bright rim
  for (let i = 0; i < 140; i++) {
    const x = rnd() * W, y = rnd() * H;
    const r = 2 + rnd() * 14;
    // Dark floor
    const dark = ctx.createRadialGradient(x, y, 0, x, y, r);
    dark.addColorStop(0,   `rgba(${br*0.55|0},${bg*0.55|0},${bb*0.55|0},0.85)`);
    dark.addColorStop(0.7, `rgba(${br*0.7|0},${bg*0.7|0},${bb*0.7|0},0.25)`);
    dark.addColorStop(1,   `rgba(${br},${bg},${bb},0)`);
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    // Bright rim
    ctx.strokeStyle = `rgba(${Math.min(255,br+50)},${Math.min(255,bg+50)},${Math.min(255,bb+50)},0.55)`;
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(x, y, r * 0.95, 0, Math.PI * 2); ctx.stroke();
  }
  // Fine speckle noise
  const img = ctx.getImageData(0, 0, W, H);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (rnd() - 0.5) * 28;
    img.data[i]   = Math.max(0, Math.min(255, img.data[i]   + n));
    img.data[i+1] = Math.max(0, Math.min(255, img.data[i+1] + n));
    img.data[i+2] = Math.max(0, Math.min(255, img.data[i+2] + n));
  }
  ctx.putImageData(img, 0, 0);
  const t = new THREE.CanvasTexture(cvs);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

function getRotationAngle(el) {
  const m = window.getComputedStyle(el).transform;
  if (!m || m === 'none') return 0;
  const v = m.match(/matrix\((.+)\)/);
  if (!v) return 0;
  const p = v[1].split(',').map(Number);
  return Math.atan2(p[1], p[0]);
}

function createPlanet(cfg) {
  const w = document.createElement('div'); w.className='planet-orbit'; w.dataset.planetId=cfg.id;
  w.style.animation=`orbit ${cfg.speed}s linear infinite`; w.style.animationDelay=`-${cfg.startAngle/360*cfg.speed}s`;

  const p = document.createElement('div'); p.className='planet'; p.dataset.id=cfg.id;
  p.setAttribute('style', `position:absolute;cursor:pointer;border-radius:50%;transform:translate(-50%,-50%);width:${cfg.size}px;height:${cfg.size}px;top:${-cfg.radius}px;left:0;box-shadow:${cfg.shadow};${cfg.style}`);

  const lbl = document.createElement('span'); lbl.className='label'; p.appendChild(lbl);
  allLabels.push({ el:lbl, getAngle:()=>getRotationAngle(w), dataKey:cfg.id });

  if (cfg.hasRings) { const r=document.createElement('div'); r.className='saturn-rings'; p.appendChild(r); }
  if (cfg.hasUranusRings) { const r=document.createElement('div'); r.className='uranus-rings'; p.appendChild(r); }

  const data = solarData[cfg.id];
  if (data.moonData && data.moonData.length > 0) {
    const ms = document.createElement('div'); ms.className='moon-system'; ms.dataset.planet=cfg.id;
    buildMoons(ms, data.moonData, w);
    p.appendChild(ms);
  }

  w.appendChild(p); solarSystem.appendChild(w);
  planetElements[cfg.id] = { el:p, wrapper:w, config:cfg };
}

function buildMoons(ms, moons, pw) {
  moons.forEach(moon => {
    const ring = document.createElement('div'); ring.className='moon-orbit-ring'; ring.style.width=ring.style.height=`${moon.orbitRadius*2}px`; ms.appendChild(ring);
    const mw = document.createElement('div'); mw.className='moon-orbit-wrapper'; mw.style.animationDuration=`${moon.speed}s`;
    const el = document.createElement('div'); el.className='moon';
    el.style.width=el.style.height=`${moon.size}px`; el.style.background='transparent';
    el.style.top=`${-moon.orbitRadius}px`; el.style.left='0';
    const ml = document.createElement('span'); ml.className='moon-label'; el.appendChild(ml);
    allMoonLabels.push({ el:ml, getPlanetAngle:()=>getRotationAngle(pw), getMoonAngle:()=>getRotationAngle(mw), moonData:moon });
    mw.appendChild(el); ms.appendChild(mw);
    // Three.js moon mesh — look up texture by english name
    const moonName = moon.name && moon.name.en;
    const texInfo = moonTextureByName[moonName];
    const moonMat = texInfo
      ? new THREE.MeshStandardMaterial({ ...texInfo, roughness: 0.95, metalness: 0.0 })
      : new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.95 });
    const mesh = new THREE.Mesh(sphereGeo, moonMat);
    mesh.visible = false;
    scene.add(mesh);
    moonMeshes.push({ mesh, el });
  });
}

function makeNavItem(parentEl, opts) {
  const item = document.createElement('div');
  item.className = 'nav-item';
  if (opts.id) item.dataset.id = opts.id;
  if (opts.action) item.dataset.action = opts.action;
  const icon = document.createElement('div');
  icon.className = 'nav-item-icon' + (opts.iconClass ? ' ' + opts.iconClass : '');
  if (opts.iconStyle) icon.style.cssText = opts.iconStyle;
  if (opts.iconHTML) icon.innerHTML = opts.iconHTML;
  const name = document.createElement('span');
  name.className = 'nav-item-name';
  item.appendChild(icon); item.appendChild(name);
  parentEl.appendChild(item);
  return { item, icon, name };
}

  navItems.forEach(({ el, id }) => el.classList.toggle('active', id === focusedId));
  homeNav.item.classList.toggle('active', atHome);
}

// ==================== UPDATE TEXT FOR LANGUAGE ====================
function updateAllText() {
  titleEl.textContent = t(i18n.title);
  hintEl.textContent = t(i18n.hint);
  allLabels.forEach(({ el, dataKey }) => { el.textContent = t(solarData[dataKey].name); });
  allMoonLabels.forEach(({ el, moonData }) => { el.textContent = t(moonData.name); });
  allBeltLabels.forEach(({ el, key }) => { el.textContent = t(i18n[key]); });
  navItems.forEach(({ nameEl, id }) => { nameEl.textContent = t(solarData[id].name); });
  navCtrls.forEach(({ nameEl, i18nKey, action }) => {
    if (action === 'pause') nameEl.textContent = t(orbitsPaused ? i18n.navPlay : i18n.navPause);
    else nameEl.textContent = t(i18n[i18nKey]);
  });
  langNav.icon.textContent = lang === 'en' ? '中' : 'EN';
  if (infoShowing && focusedId) showInfo(focusedId);
}
updateAllText();

// ==================== LABEL UPDATE LOOP ====================
function updateLabels() {
  const inv = Math.max(0.4, Math.min(3, baseScale / scale));
  allLabels.forEach(({ el, getAngle }) => { el.style.transform = `translateX(-50%) rotate(${-getAngle()}rad) scale(${inv})`; });
  allMoonLabels.forEach(({ el, getPlanetAngle, getMoonAngle }) => {
    el.style.transform = `translateX(-50%) rotate(${-(getPlanetAngle()+getMoonAngle())}rad) scale(${inv*0.85})`;
  });
  allBeltLabels.forEach(({ el }) => { el.style.transform = `translateX(-50%) scale(${inv})`; });
  requestAnimationFrame(updateLabels);
}
requestAnimationFrame(updateLabels);

// ==================== THREE.JS RENDER LOOP ====================
function syncMeshToElement(mesh, el) {
  if (!mesh || !el) return;
  const rect = el.getBoundingClientRect();
  if (rect.width === 0) { mesh.visible = false; return; }
  mesh.visible = true;
  const cx = rect.left + rect.width/2 - window.innerWidth/2;
  const cy = -(rect.top + rect.height/2 - window.innerHeight/2);
  mesh.position.set(cx, cy, 0);
  mesh.scale.setScalar(rect.width / 2);
}

function renderThree() {
  // Sun first, place light at sun center
  const sunEl = document.querySelector('.sun');
  if (sunEl) {
    syncMeshToElement(meshes.sun, sunEl);
    meshes.sun.rotation.y += 0.0008;
    sunLight.position.copy(meshes.sun.position);
    sunLight.position.z = 200;
  }
  // Planets
  Object.values(planetElements).forEach(({ el, config }) => {
    const mesh = meshes[config.id];
    if (!mesh) return;
    syncMeshToElement(mesh, el);
    mesh.rotation.y += 0.003;
    // Haumea is highly elongated — squash after sync
    if (config.id === 'haumea' && mesh.visible) {
      const s = mesh.scale.x;
      mesh.scale.set(s * 1.35, s * 0.75, s * 0.8);
    }
  });
  // Moons
  moonMeshes.forEach(({ mesh, el }) => {
    syncMeshToElement(mesh, el);
    mesh.rotation.y += 0.005;
  });
  renderer.render(scene, camera);
  requestAnimationFrame(renderThree);
}
requestAnimationFrame(renderThree);

// ==================== MOON VISIBILITY ====================
function updateMoonVisibility() {
  Object.values(planetElements).forEach(({ el, config }) => {
    const ms = el.querySelector('.moon-system');
    if (ms) ms.classList.toggle('visible', config.size * scale >= 55);
  });
}

// ==================== ANIMATE ====================
function animateTo(targetTx, targetTy, targetScale, duration, cb) {
  const s={tx,ty,scale}; const start=performance.now();
  function step(now) {
    const p=Math.min((now-start)/duration,1), e=1-Math.pow(1-p,3);
    tx=s.tx+(targetTx-s.tx)*e; ty=s.ty+(targetTy-s.ty)*e; scale=s.scale+(targetScale-s.scale)*e;
    applyTransform();
    if (p<1) requestAnimationFrame(step); else if (cb) cb();
  }
  requestAnimationFrame(step);
}

function goHome() {
  hideInfo(); resumeOrbits(); focusedId=null;
  updateNavActive();
  animateTo(0, 0, baseScale, 800);
}

// ==================== PAUSE/RESUME ====================
function pauseOrbits() {
  if (orbitsPaused) return;
  orbitsPaused=true;
  document.querySelectorAll('.planet-orbit,.moon-orbit-wrapper').forEach(el=>{ el.style.animationPlayState='paused'; });
  setPauseIcon(true);
  pauseNav.name.textContent = t(i18n.navPlay);
}

function resumeOrbits() {
  if (!orbitsPaused) return;
  orbitsPaused=false;
  document.querySelectorAll('.planet-orbit,.moon-orbit-wrapper').forEach(el=>{ el.style.animationPlayState='running'; });
  setPauseIcon(false);
  pauseNav.name.textContent = t(i18n.navPause);
}

function togglePause() { orbitsPaused ? resumeOrbits() : pauseOrbits(); }

// ==================== LANGUAGE ====================
function toggleLang() {
  lang = lang==='en' ? 'zh' : 'en';
  updateAllText();
}

// ==================== INFO PANEL ====================
function showInfo(id) {
  const data = solarData[id]; if (!data) return;
  focusedId = id;
  const accent = { sun:'#ffcc00', mercury:'#c2b5a3', venus:'#e8c898', earth:'#4898c8', mars:'#c87848', jupiter:'#d8b870', saturn:'#d0b068', uranus:'#80c8d8', neptune:'#5080d0', pluto:'#b8a898', ceres:'#a89680', haumea:'#e0e0e0', makemake:'#c08860', eris:'#d8d8e0', asteroidBelt:'#a0937e', kuiperBelt:'#8098b0' }[id]||'#fff';

  let html = `<h2 style="color:${accent}">${t(data.name)}</h2><div class="subtitle">${t(data.subtitle)}</div><div class="info-divider"></div>`;
  const facts = [[i18n.diameter,data.diameter],[i18n.fromSun,data.distFromSun],[i18n.type,data.type],[i18n.temperature,data.temperature],[i18n.age,data.age],[i18n.dayLength,data.dayLength],[i18n.yearLength,data.yearLength],[i18n.moonsLabel,data.moons!==undefined?data.moons:undefined]];
  facts.forEach(([lbl,val])=>{ if(val!==undefined) html+=`<div class="info-fact"><span class="fact-label">${t(lbl)}</span><span class="fact-value">${typeof val==='object'?t(val):val}</span></div>`; });
  html += `<div class="info-divider"></div><div class="description">${t(data.description)}</div>`;
  if (data.extraFacts) data.extraFacts.forEach(f=>{ html+=`<div class="description" style="margin-top:6px;font-size:11px;">${t(f)}</div>`; });
  if (data.funFact) html+=`<div class="fun-fact"><div class="fun-label">${t(i18n.funFact)}</div><p>${t(data.funFact)}</p></div>`;

  infoPanel.innerHTML = html;
  infoPanel.classList.add('visible');
  infoShowing = true;
  updateNavActive();
}

function hideInfo() { infoPanel.classList.remove('visible'); infoShowing=false; }

// ==================== ZOOM TO PLANET ====================
function zoomToTarget(id) {
  const entry = planetElements[id];
  let localX=0, localY=0;

  if (entry) {
    const angle = getRotationAngle(entry.wrapper);
    const r = entry.config.radius;
    localX = r * Math.sin(angle);
    localY = -r * Math.cos(angle);
  }
  // else sun: localX=0, localY=0

  const cfg = entry ? entry.config : { size: 80 };
  let zoomScale = Math.min(14, Math.max(3, 180 / cfg.size));
  if (id==='sun') zoomScale = 3;

  const mob = isMobile();
  const panelOffX = mob ? 0 : -120;
  const panelOffY = mob ? -window.innerHeight*0.12 : 0;

  const targetTx = panelOffX - localX * zoomScale;
  const targetTy = panelOffY - localY * zoomScale;

  pauseOrbits();
  animateTo(targetTx, targetTy, zoomScale, 900);
  showInfo(id);
}

// ==================== PAN & ZOOM ====================
let isDragging=false, dragSX, dragSY, dragSTx, dragSTy, hasDragged;

document.addEventListener('mousedown', (e)=>{
  if (e.target.closest('#info-panel,#nav-panel')) return;
  isDragging=true; hasDragged=false; dragSX=e.clientX; dragSY=e.clientY; dragSTx=tx; dragSTy=ty;
  document.body.classList.add('dragging');
});
document.addEventListener('mousemove', (e)=>{
  if (!isDragging) return;
  const dx=e.clientX-dragSX, dy=e.clientY-dragSY;
  if (Math.abs(dx)>3||Math.abs(dy)>3) hasDragged=true;
  tx=dragSTx+dx; ty=dragSTy+dy; applyTransform();
});
document.addEventListener('mouseup', (e)=>{
  if (!isDragging) return; isDragging=false; document.body.classList.remove('dragging');
  if (!hasDragged) handleClick(e);
});

document.addEventListener('wheel', (e)=>{
  e.preventDefault();
  const f=Math.exp(-e.deltaY*0.001);
  const ns=Math.max(baseScale*MIN_SF, Math.min(baseScale*MAX_SF, scale*f));
  const cx=e.clientX-window.innerWidth/2, cy=e.clientY-window.innerHeight/2, r=ns/scale;
  tx=cx*(1-r)+tx*r; ty=cy*(1-r)+ty*r; scale=ns; applyTransform();
}, {passive:false});

// Touch
let lastTD=0, lastTC={x:0,y:0}, tStart=0, tPos={x:0,y:0}, tMoved=false;
document.addEventListener('touchstart', (e)=>{
  if (e.target.closest('#info-panel,#nav-panel')) return; e.preventDefault();
  const ts=Array.from(e.touches); tMoved=false; tStart=Date.now();
  if (ts.length===1) { dragSX=ts[0].clientX; dragSY=ts[0].clientY; tPos={x:dragSX,y:dragSY}; dragSTx=tx; dragSTy=ty; }
  else if (ts.length===2) { lastTD=Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY); lastTC={x:(ts[0].clientX+ts[1].clientX)/2,y:(ts[0].clientY+ts[1].clientY)/2}; dragSTx=tx; dragSTy=ty; }
}, {passive:false});
document.addEventListener('touchmove', (e)=>{
  if (e.target.closest('#info-panel,#nav-panel')) return; e.preventDefault();
  const ts=Array.from(e.touches);
  if (ts.length===1) { const dx=ts[0].clientX-dragSX, dy=ts[0].clientY-dragSY; if(Math.abs(dx)>5||Math.abs(dy)>5) tMoved=true; tx=dragSTx+dx; ty=dragSTy+dy; applyTransform(); }
  else if (ts.length===2) {
    tMoved=true; const d=Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY);
    const c={x:(ts[0].clientX+ts[1].clientX)/2,y:(ts[0].clientY+ts[1].clientY)/2};
    const ns=Math.max(baseScale*MIN_SF,Math.min(baseScale*MAX_SF,scale*d/lastTD));
    const r=ns/scale, cx=c.x-window.innerWidth/2, cy=c.y-window.innerHeight/2;
    tx=cx*(1-r)+tx*r+(c.x-lastTC.x); ty=cy*(1-r)+ty*r+(c.y-lastTC.y); scale=ns;
    lastTD=d; lastTC=c; applyTransform();
  }
}, {passive:false});
document.addEventListener('touchend', (e)=>{
  if (e.touches.length===0 && !tMoved && Date.now()-tStart<300) handleClick({clientX:tPos.x,clientY:tPos.y,target:document.elementFromPoint(tPos.x,tPos.y)});
  if (e.touches.length===1) { dragSX=e.touches[0].clientX; dragSY=e.touches[0].clientY; dragSTx=tx; dragSTy=ty; }
});

// ==================== CLICK HANDLER ====================
function handleClick(e) {
  const tgt = e.target || document.elementFromPoint(e.clientX, e.clientY);
  if (!tgt) return;

  const planet = tgt.closest('.planet') || tgt.closest('.dwarf-planet');
  if (planet) { zoomToTarget(planet.dataset.id); return; }
  if (tgt.closest('.sun')) { zoomToTarget('sun'); return; }
  if (tgt.closest('.asteroid-belt')) { showInfo('asteroidBelt'); focusedId='asteroidBelt'; return; }
  if (tgt.closest('.kuiper-belt')) { showInfo('kuiperBelt'); focusedId='kuiperBelt'; return; }

  // Clicked empty space — dismiss & resume
  if (infoShowing) { hideInfo(); resumeOrbits(); focusedId=null; }
}

document.addEventListener('keydown', (e)=>{
  if (e.key==='Escape') { if(infoShowing){hideInfo();resumeOrbits();focusedId=null;} else goHome(); }
  if (e.key===' ') { e.preventDefault(); togglePause(); }
});

// ==================== INIT ====================
let viewInitialized = false;
function initView() {
  if (window.innerWidth <= 0 || window.innerHeight <= 0) return;
  baseScale = getBaseScale(); scale = baseScale; tx=0; ty=0; applyTransform();
  resizeStars();
  resizeThree();
  viewInitialized = true;
}
initView();
if (!viewInitialized) {
  const ro = new ResizeObserver(() => { if (!viewInitialized) initView(); });
  ro.observe(document.documentElement);
  window.addEventListener('load', initView, { once: true });
}
window.addEventListener('resize', ()=>{
  if (!viewInitialized) { initView(); return; }
  const wasAtBase = Math.abs(scale - baseScale) < 0.01 && Math.abs(tx) < 5 && Math.abs(ty) < 5;
  baseScale = getBaseScale();
  if (wasAtBase) { scale = baseScale; tx=0; ty=0; applyTransform(); }
  resizeStars();
  resizeThree();
});

// ==================== MUSIC (very gentle wind chimes) ====================
let audioCtx=null, musicPlaying=false, masterGain=null, chimeTimer=null;

const chimeNotes = [523.25, 659.25, 783.99, 880.00, 1046.50, 1318.51];

function playChime() {
  if (!audioCtx||!musicPlaying) return;
  const now=audioCtx.currentTime, freq=chimeNotes[Math.floor(Math.random()*chimeNotes.length)];
  const osc=audioCtx.createOscillator(); osc.type='sine'; osc.frequency.value=freq;
  const g=audioCtx.createGain(); g.gain.setValueAtTime(0.018, now); g.gain.exponentialRampToValueAtTime(0.0005, now+3);
  osc.connect(g).connect(masterGain); osc.start(now); osc.stop(now+3.5);
  chimeTimer = setTimeout(playChime, 3000+Math.random()*5000);
}

function createMusic() {
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value=0; masterGain.connect(audioCtx.destination);
  masterGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime+2);
  musicPlaying=true; setTimeout(playChime, 1000);
}

function toggleMusic() {
  if (!audioCtx) { createMusic(); setMuteIcon(true); return; }
  if (musicPlaying) { masterGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5); musicPlaying=false; if(chimeTimer)clearTimeout(chimeTimer); setMuteIcon(false); }
  else { masterGain.gain.linearRampToValueAtTime(1,audioCtx.currentTime+0.5); musicPlaying=true; playChime(); setMuteIcon(true); }
}
</script>
